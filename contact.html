<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Nguyen's Portfolio - Contact & Survey</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <header>
    <div class="header-inner">
      <h1>Nguyen's Portfolio</h1>
      <nav aria-label="Main navigation">
        <ul class="nav-list">
          <li><a href="index.html">Home</a></li>
          <li><a href="favorites.html">Favorite Music & Games</a></li>
          <li><a class="active" href="contact.html">Contact & Survey</a></li>
          <li><a href="vacation.html">Dream Vacation</a></li>
        </ul>
      </nav>
    </div>
  </header>

  <main>
    <section class="card">
      <h2>Contact Me</h2>
      <form action="#" method="post">
        <label for="name">Full Name</label>
        <input type="text" id="name" name="name" required />

        <label for="email">Email Address</label>
        <input type="email" id="email" name="email" required />

        <label for="message">Message</label>
        <textarea id="message" name="message" rows="5" placeholder="Write your message here..."></textarea>

        <button type="submit">Send Message</button>
      </form>
    </section>

    <section class="card">
      <h2>Website Survey</h2>
      <form action="#" method="post">
        <fieldset>
          <legend>What section did you like most?</legend>
          <label><input type="radio" name="favorite-section" value="home" /> Home</label>
          <label><input type="radio" name="favorite-section" value="music-games" /> Favorite Music & Games</label>
          <label><input type="radio" name="favorite-section" value="vacation" /> Dream Vacation</label>
        </fieldset>

        <fieldset>
          <legend>What topics interest you?</legend>
          <label><input type="checkbox" name="interests" value="music" /> Music</label>
          <label><input type="checkbox" name="interests" value="gaming" /> Gaming</label>
          <label><input type="checkbox" name="interests" value="fitness" /> Fitness</label>
          <label><input type="checkbox" name="interests" value="travel" /> Travel</label>
        </fieldset>

        <label for="rating">Rate this website (1 to 5)</label>
        <select id="rating" name="rating">
          <option value="1">1</option>
          <option value="2">2</option>
          <option value="3">3</option>
          <option value="4">4</option>
          <option value="5">5</option>
        </select>

        <label for="comments">Additional Comments</label>
        <textarea id="comments" name="comments" rows="4" placeholder="Share your thoughts..."></textarea>

        <button type="submit">Submit Survey</button>
      </form>
    </section>
  </main>

  <footer>
    <div class="footer-inner">
      <p>&copy; 2026 Nguyen's Portfolio</p>
      <div class="footer-icons">
        <a href="https://github.com/Sniper0084">GitHub</a>
      </div>
    </div>
  </footer>
</body>
</html>
